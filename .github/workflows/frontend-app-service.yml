name: Deploy Frontend to Azure App Service

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-app-service.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  AZURE_WEBAPP_NAME: 'edurag-frontend'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js app (standalone)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: 'https://edurag-api.azurewebsites.net'
        run: npm run build

      - name: Prepare standalone package
        working-directory: frontend
        run: |
          # Copy static assets into standalone (required for Next.js standalone)
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          # package.json with PORT support for Azure App Service (must listen on 8080)
          cat > .next/standalone/package.json << 'EOF'
          {
            "name": "edurag-frontend",
            "version": "1.0.0",
            "scripts": {
              "start": "node server.js"
            }
          }
          EOF

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: frontend/.next/standalone
          startup-command: 'PORT=8080 HOSTNAME=0.0.0.0 node server.js'
