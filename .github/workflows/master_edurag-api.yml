name: Build and deploy Python app to Azure Web App - edurag-api

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - '.github/workflows/master_edurag-api.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare deployment package (backend as root)
        run: |
          mkdir deploy
          cp -r backend/* deploy/
          cp requirements.txt deploy/

      - name: Pre-install dependencies into package (avoids slow runtime pip install)
        run: |
          pip install -r deploy/requirements.txt \
            --target deploy/.python_packages/lib/site-packages \
            --no-cache-dir

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            deploy/
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_70059F3C7F3A49C898C1E78217D920AB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B604F1544FDF4F41B5166626DA5788C7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F2D26BC1196943029A3B7E15C9E4136C }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'edurag-api'
          slot-name: 'Production'
          package: '.'
          startup-command: 'python -m uvicorn main:app --host 0.0.0.0 --port 8000 --log-level info'
