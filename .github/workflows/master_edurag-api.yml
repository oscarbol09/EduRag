name: Build and deploy Python app to Azure Web App - edurag-api

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - '.github/workflows/master_edurag-api.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Pytest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          cd backend
          pytest -v

      - name: Prepare deployment package
        # Do NOT include the antenv virtualenv in the zip.
        # Azure Oryx will run `pip install -r requirements.txt` during deployment,
        # which is far faster than extracting a pre-built venv tarball that
        # would exceed Azure's 230-second container startup timeout.
        run: |
          mkdir deploy
          cp -r backend/* deploy/
          cp requirements.txt deploy/
          # Exclude any local venv, __pycache__, .env files
          rm -rf deploy/antenv deploy/__pycache__ deploy/.env deploy/chroma_data

      - name: Zip deployment package
        run: |
          cd deploy
          zip -r ../app.zip . --exclude "*.pyc" --exclude "__pycache__/*" --exclude ".env"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_70059F3C7F3A49C898C1E78217D920AB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B604F1544FDF4F41B5166626DA5788C7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F2D26BC1196943029A3B7E15C9E4136C }}

      - name: Configure App Settings for Oryx build
        run: |
          az webapp config appsettings set \
            --resource-group edubot-app \
            --name edurag-api \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              ENABLE_ORYX_BUILD=true \
              WEBSITES_PORT=8000
          sleep 20

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'edurag-api'
          slot-name: 'Production'
          package: 'app.zip'
          startup-command: 'gunicorn --bind=0.0.0.0:8000 --worker-class uvicorn.workers.UvicornWorker --timeout 120 main:app'
